    color: var(--amber-deep);

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleBlocks(blocks) {
  return blocks.map(block => {
    const shuffledQuestions = shuffleArray(block.questions).map(q => {
      if (block.type !== 'mcq') return q;
      const optsWithIndex = q.opts.map((opt, i) => ({ opt, isCorrect: i === q.a }));
      const shuffledOpts = shuffleArray(optsWithIndex);
      const newOpts = shuffledOpts.map(o => o.opt);
      const newAnswerIdx = shuffledOpts.findIndex(o => o.isCorrect);
      return { ...q, opts: newOpts, a: newAnswerIdx };
    });
    return { ...block, questions: shuffledQuestions };

function levelFromScore(score) {
  if (score >= 10) return 'Sobresaliente';
  if (score >= 8) return 'Alto';
  if (score >= 5) return 'Medio';
  return 'Bajo';
}
function levelClass(level) {
  return 'level-' + level.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

const { useState, useEffect, useRef, useCallback } = React;

function useTimer(initialSec, onExpire, active) {
  const [remaining, setRemaining] = useState(initialSec);
  const onExpireRef = useRef(onExpire);
  onExpireRef.current = onExpire;

  useEffect(() => {
    setRemaining(initialSec);
  }, [initialSec]);

  useEffect(() => {
    if (!active) return;
    if (remaining <= 0) {
      onExpireRef.current();
      return;
    }
    const t = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [remaining, active]);

  return remaining;
}

      setView('divider');
    } else {
      submitResults();
    }
  }

  function selectAnswer(value) {
    setAnswers(prev => {
      const arr = (prev[block.id] || []).slice();
      arr[qIdx] = value;
      return { ...prev, [block.id]: arr };
    });
  }

  function nextQuestion() {
    if (qIdx + 1 < block.questions.length) {
      setQIdx(qIdx + 1);
    } else {
      finishBlock();
    }
  }
  function prevQuestion() {
    if (qIdx > 0) setQIdx(qIdx - 1);
  }

  function startBlock() {
    setView('quiz');
  }

  function startTest() {
    startTimeRef.current = Date.now();
    setView('quiz');
  }

  async function submitResults() {
    const scoreBlocks = {};
    let total = 0;
    shuffledBlocksState.forEach(b => {
      if (b.type === 'mcq') {
        const userAns = answers[b.id] || [];
        let correct = 0;
        b.questions.forEach((q, i) => { if (userAns[i] === q.a) correct++; });
        scoreBlocks[b.id] = correct;
        total += correct;
      } else if (b.type === 'likert') {
        const userAns = answers[b.id] || [];
        const cats = { tareas: [], personas: [], estres: [] };
        b.questions.forEach((q, i) => {
          const v = userAns[i];
          if (typeof v === 'number') cats[q.cat].push(v);
        });
        const avg = arr => arr.length ? (arr.reduce((a,c)=>a+c,0)/arr.length) : null;
        scoreBlocks.estilo_tareas = avg(cats.tareas);
        scoreBlocks.estilo_personas = avg(cats.personas);
        scoreBlocks.estilo_estres = avg(cats.estres);
      }
    });

    const level = levelFromScore(total / 4);
    const summaryLines = [
      'NUEVO RESULTADO DE PRUEBA PSICOTÉCNICA',
      '',
      'Candidato: ' + (candidate.name || 'Sin nombre'),
      'Cargo: ' + (candidate.position || 'No especificado'),
      'Fecha: ' + new Date().toLocaleString('es-CO'),
      '',
      '--- Puntajes cognitivos (sobre 10 cada uno) ---',
      'Verbal: ' + (scoreBlocks.verbal ?? '-'),
      'Numérico: ' + (scoreBlocks.numerico ?? '-'),
      'Lógico-Abstracto: ' + (scoreBlocks.logico ?? '-'),
      'Atención y Precisión: ' + (scoreBlocks.atencion ?? '-'),
      'TOTAL: ' + total + ' / 40',
      'Perfil general: ' + level,
      '',
      '--- Estilo de trabajo (escala 1-5) ---',
      'Orientación a tareas: ' + (scoreBlocks.estilo_tareas != null ? scoreBlocks.estilo_tareas.toFixed(1) : '-'),
      'Orientación a personas: ' + (scoreBlocks.estilo_personas != null ? scoreBlocks.estilo_personas.toFixed(1) : '-'),
      'Manejo del estrés: ' + (scoreBlocks.estilo_estres != null ? scoreBlocks.estilo_estres.toFixed(1) : '-'),
    ].join('\n');

    try {
      const formData = new FormData();
      formData.append('_subject', 'Resultado prueba psicotécnica: ' + (candidate.name || 'Sin nombre'));
      formData.append('nombre', candidate.name || 'Sin nombre');
      formData.append('cargo', candidate.position || 'No especificado');
      formData.append('fecha', new Date().toLocaleString('es-CO'));
      formData.append('puntaje_verbal', scoreBlocks.verbal ?? '');
      formData.append('puntaje_numerico', scoreBlocks.numerico ?? '');
      formData.append('puntaje_logico', scoreBlocks.logico ?? '');
      formData.append('puntaje_atencion', scoreBlocks.atencion ?? '');
      formData.append('total_cognitivo', total + ' / 40');
      formData.append('perfil_general', level);
      formData.append('estilo_tareas', scoreBlocks.estilo_tareas != null ? scoreBlocks.estilo_tareas.toFixed(1) : '');
      formData.append('estilo_personas', scoreBlocks.estilo_personas != null ? scoreBlocks.estilo_personas.toFixed(1) : '');
      formData.append('estilo_estres', scoreBlocks.estilo_estres != null ? scoreBlocks.estilo_estres.toFixed(1) : '');
      formData.append('resumen', summaryLines);

      await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });
      setSubmitStatus('ok');
    } catch (e) {
      console.error('Error enviando resultado', e);
      setSubmitStatus('error');
    }

    setView('done');
  }

  function backToIntro() {
    setView('intro');
    setBlockIdx(0); setQIdx(0); setAnswers({});
    setCandidate({ name: '', position: '' });
    setSubmitStatus(null);
  }

  // ============================================================
  // RENDER: TOP BAR
  // ============================================================
  const topBar = React.createElement('div', { className: 'topbar' },
    React.createElement('div', { className: 'brand-group', onClick: backToIntro, style: {cursor:'pointer', display:'flex', alignItems:'center', gap:'8px'} },
      React.createElement('img', { src: LOGO_ICON_SRC, alt: 'RueData AI', style: { height: '20px', width: 'auto' } }),
      React.createElement('span', { className: 'brand' }, 'RueData AI · Evaluación de Aptitudes')
    )
  );

  // ============================================================
  // RENDER: INTRO
  // ============================================================
  function renderIntro() {
    const ready = candidate.name.trim().length > 1;
    return React.createElement('div', { className: 'screen' },
      React.createElement('img', { src: LOGO_VERTICAL_SRC, alt: 'RueData AI', className: 'intro-logo' }),
      React.createElement('div', { className: 'intro-eyebrow' }, 'Prueba psicotécnica general'),
      React.createElement('h1', { className: 'intro-title' }, 'Evaluación de habilidades básicas para cualquier cargo'),
      React.createElement('p', { className: 'intro-sub' },
        'Esta prueba mide razonamiento verbal, numérico, lógico, atención y estilo de trabajo. Tiene tiempo límite por bloque — cuando el tiempo de un bloque se agota, avanzas automáticamente al siguiente.'),
      React.createElement('div', { className: 'block-list' },
        shuffledBlocksState.map((b, i) => React.createElement('div', { className: 'block-row', key: b.id },
          React.createElement('div', { className: 'block-num' }, String(i+1).padStart(2,'0')),
          React.createElement('div', { className: 'block-info' },
            React.createElement('div', { className: 'block-name' }, b.name),
            React.createElement('div', { className: 'block-desc' }, b.desc)
          ),
          React.createElement('div', { className: 'block-time' }, fmtTime(b.timeSec))
        ))
      ),
      React.createElement('div', { className: 'field-group' },
        React.createElement('label', { className: 'field-label' }, 'Nombre completo'),
        React.createElement('input', {
          className: 'field-input', type: 'text', value: candidate.name,
          onChange: e => setCandidate(c => ({...c, name: e.target.value})),
          placeholder: 'Ej. María Fernanda Gómez'
        })
      ),
      React.createElement('div', { className: 'field-group' },
        React.createElement('label', { className: 'field-label' }, 'Cargo al que aplicas'),
        React.createElement('input', {
          className: 'field-input', type: 'text', value: candidate.position,
          onChange: e => setCandidate(c => ({...c, position: e.target.value})),
          placeholder: 'Ej. Analista de Operaciones'
        })
      ),
      React.createElement('button', {
        className: 'btn-primary', disabled: !ready, onClick: startTest
      }, 'Comenzar prueba →'),
      React.createElement('p', { className: 'disclaimer' },
        'Tus respuestas se enviarán automáticamente al equipo de selección al finalizar. No verás tu puntaje detallado en pantalla.')
    );
  }

  // ============================================================
  // RENDER: BLOCK DIVIDER
  // ============================================================
  function renderDivider() {
    const b = shuffledBlocksState[blockIdx];
    return React.createElement('div', { className: 'screen' },
      React.createElement('div', { className: 'block-divider' },
        React.createElement('div', { className: 'block-divider-eyebrow' }, b.tag),
        React.createElement('div', { className: 'block-divider-title' }, b.name),
        React.createElement('div', { className: 'block-divider-desc' }, b.desc),
        React.createElement('div', { className: 'block-divider-time' }, 'Tiempo asignado: ' + fmtTime(b.timeSec) + ' · ' + b.questions.length + ' preguntas'),
        React.createElement('button', { className: 'btn-primary', onClick: startBlock }, 'Iniciar bloque →')
      )
    );
  }

  // ============================================================
  // RENDER: QUIZ
  // ============================================================
  function renderQuiz() {
    const b = block;
    const q = b.questions[qIdx];
    const userAns = (answers[b.id] || [])[qIdx];
    const hasAnswer = userAns !== undefined;

    return React.createElement(QuizBody, {
      key: b.id,
      block: b,
      qIdx, q, userAns, hasAnswer,
      onExpire: handleBlockExpire,
      onSelect: selectAnswer,
      onNext: nextQuestion,
      onPrev: prevQuestion,
    });
  }

  // ============================================================
  // RENDER: DONE
  // ============================================================
  function renderDone() {
    const firstName = candidate.name.split(' ')[0] || '';
    return React.createElement('div', { className: 'screen' },
      React.createElement('div', { className: 'done-screen' },
        React.createElement('div', { className: 'done-icon' }, '✓'),
        React.createElement('div', { className: 'done-title' }, 'Prueba completada'),
        React.createElement('p', { className: 'done-sub' },
          'Gracias, ' + firstName + '. Tus respuestas fueron registradas. El equipo de selección revisará tus resultados como parte del proceso.'),
        submitStatus === 'error' && React.createElement('p', { style: { color: 'var(--danger)', fontSize: '13px', marginTop: '16px' } },
          'Hubo un problema técnico al enviar tus respuestas. Por favor avisa al equipo de selección.')
      )
    );
  }

  let body;
  if (view === 'intro') body = renderIntro();
  else if (view === 'divider') body = renderDivider();
  else if (view === 'quiz') body = renderQuiz();
  else if (view === 'done') body = renderDone();

  return React.createElement(React.Fragment, null, topBar, body);
}

// ============================================================
// QUIZ BODY (isolated component so timer resets cleanly per block)
// ============================================================
function QuizBody({ block, qIdx, q, userAns, hasAnswer, onExpire, onSelect, onNext, onPrev }) {
  const remaining = useTimer(block.timeSec, onExpire, true);
  const pct = (remaining / block.timeSec) * 100;
  const urgent = remaining <= 20;
  const progressPct = ((qIdx + 1) / block.questions.length) * 100;

  return React.createElement('div', { className: 'screen' },
    React.createElement('div', { className: 'quiz-header' },
      React.createElement('div', { className: 'quiz-header-top' },
        React.createElement('div', null,
          React.createElement('div', { className: 'block-tag' }, block.tag),
          React.createElement('div', { className: 'block-title' }, block.name)
        ),
        React.createElement('div', { className: 'timer-box' },
          React.createElement('div', { className: 'timer-value' + (urgent ? ' urgent' : '') }, fmtTime(remaining)),
          React.createElement('div', { className: 'timer-label' }, 'tiempo restante')
        )
      ),
      React.createElement('div', { className: 'progress-track' },
        React.createElement('div', { className: 'progress-fill' + (urgent ? ' urgent' : ''), style: { width: progressPct + '%' } })
      ),
      React.createElement('div', { className: 'progress-meta' },
        React.createElement('span', null, 'Pregunta ' + (qIdx + 1) + ' de ' + block.questions.length),
        React.createElement('span', null, Math.round(pct) + '% del tiempo del bloque')
      )
    ),
    React.createElement('div', { className: 'question-card' },
      React.createElement('div', { className: 'question-num' }, 'Pregunta ' + (qIdx + 1)),
      React.createElement('div', { className: 'question-text' },
        q.q.split('\n').map((line, i) => React.createElement('div', { key: i }, line))),
      block.type === 'mcq'
        ? React.createElement('div', { className: 'options-list' },
            q.opts.map((opt, i) => React.createElement('button', {
              key: i,
              className: 'option-btn' + (userAns === i ? ' selected' : ''),
              onClick: () => onSelect(i)
            },
              React.createElement('span', { className: 'option-letter' }, String.fromCharCode(65 + i)),
              React.createElement('span', null, opt)
            ))
          )
        : React.createElement('div', { className: 'likert-scale' },
            [1,2,3,4,5].map(v => React.createElement('button', {
              key: v,
              className: 'likert-btn' + (userAns === v ? ' selected' : ''),
              onClick: () => onSelect(v)
            },
              React.createElement('span', { className: 'likert-num' }, v),
              React.createElement('span', { className: 'likert-text' }, LIKERT_LABELS[v-1])
            ))
          )
    ),
    React.createElement('div', { className: 'nav-row' },
      React.createElement('button', { className: 'btn-ghost', onClick: onPrev, disabled: qIdx === 0, style: qIdx === 0 ? {opacity:0.4, cursor:'not-allowed'} : {} }, '← Anterior'),
      React.createElement('button', { className: 'btn-primary', onClick: onNext, disabled: !hasAnswer },
        qIdx + 1 < block.questions.length ? 'Siguiente →' : 'Finalizar bloque →')
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));

})();
</script>
</body>
</html>
