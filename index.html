<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de Aptitudes — Prueba Psicotécnica</title>
</head>
<body style="margin:0;">
<div id="app"></div>

<style>
  :root {
    --ink: #1A1640;
    --ink-soft: #2A2470;
    --paper: #F7F6FB;
    --paper-card: #FFFFFF;
    --brand-start: #211E51;
    --brand-mid: #4146A0;
    --brand-end: #80287E;
    --amber: #80287E;
    --amber-deep: #5E1F60;
    --teal: #4146A0;
    --line: #E1DEEF;
    --muted: #6B6890;
    --danger: #B3402F;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  #app {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  #app * { box-sizing: border-box; }

  .screen {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }
  .brand {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .intro-logo {
    height: 44px;
    width: auto;
    margin-bottom: 28px;
  }

  /* ---------- Intro screen ---------- */
  .intro-eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber-deep);
    margin-bottom: 14px;
  }
  h1.intro-title {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 600;
    line-height: 1.08;
    margin: 0 0 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .intro-sub {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 0 36px;
  }

  .block-list {
    border-top: 1px solid var(--line);
    margin-bottom: 36px;
  }
  .block-row {
    display: flex;
    align-items: baseline;
    gap: 18px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .block-num {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--amber-deep);
    width: 24px;
    flex-shrink: 0;
  }
  .block-info { flex: 1; }
  .block-name { font-weight: 600; font-size: 15px; }
  .block-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .block-time {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .field-group { margin-bottom: 18px; }
  .field-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    font-family: var(--font-body);
    font-size: 15px;
    background: var(--paper-card);
    color: var(--ink);
  }
  .field-input:focus {
    outline: none;
    border-color: var(--amber-deep);
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--brand-start), var(--brand-mid) 55%, var(--brand-end));
    color: #FFFFFF;
    border: none;
    padding: 15px 28px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { background: #C9C6DA; cursor: not-allowed; opacity: 1; }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
    padding: 13px 24px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--ink-soft); }

  .disclaimer {
    font-size: 12px;
    color: var(--muted);
    margin-top: 18px;
    line-height: 1.6;
  }

  /* ---------- Quiz screen ---------- */
  .quiz-header {
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 10;
    padding: 18px 0 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .quiz-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .block-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber-deep);
    margin-bottom: 4px;
  }
  .block-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    color: var(--ink);
  }
  .timer-box {
    text-align: right;
    flex-shrink: 0;
  }
  .timer-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .timer-value.urgent { color: var(--danger); }
  .timer-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-track {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand-mid), var(--brand-end));
    transition: width 0.3s ease;
  }
  .progress-fill.urgent { background: var(--danger); }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .question-card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .question-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--amber-deep);
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 22px;
    line-height: 1.45;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    padding: 14px 16px;
    border: 1.5px solid var(--line);
    border-radius: 5px;
    background: var(--paper-card);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .option-btn:hover { border-color: var(--brand-mid); background: #FAF7FC; }
  .option-btn.selected {
    border-color: var(--brand-mid);
    background: linear-gradient(135deg, var(--brand-start), var(--brand-mid) 60%, var(--brand-end));
    color: #FFFFFF;
  }
  .option-letter {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Likert specific */
  .likert-scale {
    display: flex;
    gap: 8px;
    justify-content: space-between;
  }
  .likert-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 6px;
    border: 1.5px solid var(--line);
    border-radius: 5px;
    background: var(--paper-card);
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .likert-btn:hover { border-color: var(--brand-mid); }
  .likert-btn.selected { border-color: var(--brand-end); background: linear-gradient(135deg, var(--brand-start), var(--brand-end)); color: white; }
  .likert-num { font-family: var(--font-mono); font-weight: 700; font-size: 16px; }
  .likert-text { font-size: 10px; text-align: center; line-height: 1.2; color: var(--muted); }
  .likert-btn.selected .likert-text { color: rgba(255,255,255,0.85); }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
  }

  .block-divider {
    text-align: center;
    padding: 60px 0;
  }
  .block-divider-eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-deep);
    margin-bottom: 16px;
  }
  .block-divider-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .block-divider-desc {
    color: var(--muted);
    margin-bottom: 8px;
    font-size: 15px;
  }
  .block-divider-time {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 32px;
  }

  /* ---------- Done screen ---------- */
  .done-screen {
    text-align: center;
    padding: 80px 24px;
  }
  .done-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-start), var(--brand-mid), var(--brand-end));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 26px;
  }
  .done-title {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .done-sub {
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto;
    font-size: 15px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    h1.intro-title { font-size: 30px; }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    .likert-scale { flex-wrap: wrap; }
  }
</style>

const FORMSPREE_ENDPOINT = 'https://formspree.io/f/TU_ID_AQUI';

function levelFromScore(score) {
  if (score >= 10) return 'Sobresaliente';
  if (score >= 8) return 'Alto';
  if (score >= 5) return 'Medio';
  return 'Bajo';
}
function levelClass(level) {
  return 'level-' + level.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

const { useState, useEffect, useRef, useCallback } = React;

function useTimer(initialSec, onExpire, active) {
  const [remaining, setRemaining] = useState(initialSec);
  const onExpireRef = useRef(onExpire);
  onExpireRef.current = onExpire;

  useEffect(() => {
    setRemaining(initialSec);
  }, [initialSec]);

  useEffect(() => {
    if (!active) return;
    if (remaining <= 0) {
      onExpireRef.current();
      return;
    }
    const t = setTimeout(() => setRemaining(r => r - 1), 1000);
    return () => clearTimeout(t);
  }, [remaining, active]);

  return remaining;
}

function App() {
  const [view, setView] = useState('intro'); // intro | quiz | divider | done
  const [candidate, setCandidate] = useState({ name: '', position: '' });
  const [blockIdx, setBlockIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // {blockId: [answers]}
  const [submitStatus, setSubmitStatus] = useState(null); // null | 'ok' | 'error'
  const startTimeRef = useRef(null);

  const block = BLOCKS[blockIdx];

  const goToNextQuestion = useCallback(() => {
    setQIdx(prev => {
      const curBlock = BLOCKS[blockIdx];
      if (prev + 1 < curBlock.questions.length) {
        return prev + 1;
      }
      return prev;
    });
  }, [blockIdx]);

  const handleBlockExpire = useCallback(() => {
    finishBlock();
  }, [blockIdx, answers]);

  function finishBlock() {
    if (blockIdx + 1 < BLOCKS.length) {
      setBlockIdx(b => b + 1);
      setQIdx(0);
      setView('divider');
    } else {
      submitResults();
    }
  }

  function selectAnswer(value) {
    setAnswers(prev => {
      const arr = (prev[block.id] || []).slice();
      arr[qIdx] = value;
      return { ...prev, [block.id]: arr };
    });
  }

  function nextQuestion() {
    if (qIdx + 1 < block.questions.length) {
      setQIdx(qIdx + 1);
    } else {
      finishBlock();
    }
  }
  function prevQuestion() {
    if (qIdx > 0) setQIdx(qIdx - 1);
  }

  function startBlock() {
    setView('quiz');
  }

  function startTest() {
    startTimeRef.current = Date.now();
    setView('quiz');
  }

  async function submitResults() {
    const scoreBlocks = {};
    let total = 0;
    BLOCKS.forEach(b => {
      if (b.type === 'mcq') {
        const userAns = answers[b.id] || [];
        let correct = 0;
        b.questions.forEach((q, i) => { if (userAns[i] === q.a) correct++; });
        scoreBlocks[b.id] = correct;
        total += correct;
      } else if (b.type === 'likert') {
        const userAns = answers[b.id] || [];
        const cats = { tareas: [], personas: [], estres: [] };
        b.questions.forEach((q, i) => {
          const v = userAns[i];
          if (typeof v === 'number') cats[q.cat].push(v);
        });
        const avg = arr => arr.length ? (arr.reduce((a,c)=>a+c,0)/arr.length) : null;
        scoreBlocks.estilo_tareas = avg(cats.tareas);
        scoreBlocks.estilo_personas = avg(cats.personas);
        scoreBlocks.estilo_estres = avg(cats.estres);
      }
    });

    const level = levelFromScore(total / 4);
    const summaryLines = [
      'NUEVO RESULTADO DE PRUEBA PSICOTÉCNICA',
      '',
      'Candidato: ' + (candidate.name || 'Sin nombre'),
      'Cargo: ' + (candidate.position || 'No especificado'),
      'Fecha: ' + new Date().toLocaleString('es-CO'),
      '',
      '--- Puntajes cognitivos (sobre 10 cada uno) ---',
      'Verbal: ' + (scoreBlocks.verbal ?? '-'),
      'Numérico: ' + (scoreBlocks.numerico ?? '-'),
      'Lógico-Abstracto: ' + (scoreBlocks.logico ?? '-'),
      'Atención y Precisión: ' + (scoreBlocks.atencion ?? '-'),
      'TOTAL: ' + total + ' / 40',
      'Perfil general: ' + level,
      '',
      '--- Estilo de trabajo (escala 1-5) ---',
      'Orientación a tareas: ' + (scoreBlocks.estilo_tareas != null ? scoreBlocks.estilo_tareas.toFixed(1) : '-'),
      'Orientación a personas: ' + (scoreBlocks.estilo_personas != null ? scoreBlocks.estilo_personas.toFixed(1) : '-'),
      'Manejo del estrés: ' + (scoreBlocks.estilo_estres != null ? scoreBlocks.estilo_estres.toFixed(1) : '-'),
    ].join('\n');

    try {
      await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: 'Resultado prueba psicotécnica: ' + (candidate.name || 'Sin nombre'),
          nombre: candidate.name || 'Sin nombre',
          cargo: candidate.position || 'No especificado',
          fecha: new Date().toLocaleString('es-CO'),
          puntaje_verbal: scoreBlocks.verbal ?? '',
          puntaje_numerico: scoreBlocks.numerico ?? '',
          puntaje_logico: scoreBlocks.logico ?? '',
          puntaje_atencion: scoreBlocks.atencion ?? '',
          total_cognitivo: total + ' / 40',
          perfil_general: level,
          estilo_tareas: scoreBlocks.estilo_tareas != null ? scoreBlocks.estilo_tareas.toFixed(1) : '',
          estilo_personas: scoreBlocks.estilo_personas != null ? scoreBlocks.estilo_personas.toFixed(1) : '',
          estilo_estres: scoreBlocks.estilo_estres != null ? scoreBlocks.estilo_estres.toFixed(1) : '',
          resumen: summaryLines
        })
      });
      setSubmitStatus('ok');
    } catch (e) {
      console.error('Error enviando resultado', e);
      setSubmitStatus('error');
    }

    setView('done');
  }

  function backToIntro() {
    setView('intro');
    setBlockIdx(0); setQIdx(0); setAnswers({});
    setCandidate({ name: '', position: '' });
    setSubmitStatus(null);
  }

  // ============================================================
  // RENDER: TOP BAR
  // ============================================================
  const topBar = React.createElement('div', { className: 'topbar' },
    React.createElement('div', { className: 'brand-group', onClick: backToIntro, style: {cursor:'pointer', display:'flex', alignItems:'center', gap:'10px'} },
      React.createElement('img', { src: LOGO_SRC, alt: 'RueData AI', style: { height: '22px', width: 'auto' } }),
      React.createElement('span', { className: 'brand' }, '· Evaluación de Aptitudes')
    )
  );

  // ============================================================
  // RENDER: INTRO
  // ============================================================
  function renderIntro() {
    const ready = candidate.name.trim().length > 1;
    return React.createElement('div', { className: 'screen' },
      React.createElement('img', { src: LOGO_SRC, alt: 'RueData AI', className: 'intro-logo' }),
      React.createElement('div', { className: 'intro-eyebrow' }, 'Prueba psicotécnica general'),
      React.createElement('h1', { className: 'intro-title' }, 'Evaluación de habilidades básicas para cualquier cargo'),
      React.createElement('p', { className: 'intro-sub' },
        'Esta prueba mide razonamiento verbal, numérico, lógico, atención y estilo de trabajo. Tiene tiempo límite por bloque — cuando el tiempo de un bloque se agota, avanzas automáticamente al siguiente.'),
      React.createElement('div', { className: 'block-list' },
        BLOCKS.map((b, i) => React.createElement('div', { className: 'block-row', key: b.id },
          React.createElement('div', { className: 'block-num' }, String(i+1).padStart(2,'0')),
          React.createElement('div', { className: 'block-info' },
            React.createElement('div', { className: 'block-name' }, b.name),
            React.createElement('div', { className: 'block-desc' }, b.desc)
          ),
          React.createElement('div', { className: 'block-time' }, fmtTime(b.timeSec))
        ))
      ),
      React.createElement('div', { className: 'field-group' },
        React.createElement('label', { className: 'field-label' }, 'Nombre completo'),
        React.createElement('input', {
          className: 'field-input', type: 'text', value: candidate.name,
          onChange: e => setCandidate(c => ({...c, name: e.target.value})),
          placeholder: 'Ej. María Fernanda Gómez'
        })
      ),
      React.createElement('div', { className: 'field-group' },
        React.createElement('label', { className: 'field-label' }, 'Cargo al que aplicas'),
        React.createElement('input', {
          className: 'field-input', type: 'text', value: candidate.position,
          onChange: e => setCandidate(c => ({...c, position: e.target.value})),
          placeholder: 'Ej. Analista de Operaciones'
        })
      ),
      React.createElement('button', {
        className: 'btn-primary', disabled: !ready, onClick: startTest
      }, 'Comenzar prueba →'),
      React.createElement('p', { className: 'disclaimer' },
        'Tus respuestas se enviarán automáticamente al equipo de selección al finalizar. No verás tu puntaje detallado en pantalla.')
    );
  }

  // ============================================================
  // RENDER: BLOCK DIVIDER
  // ============================================================
  function renderDivider() {
    const b = BLOCKS[blockIdx];
    return React.createElement('div', { className: 'screen' },
      React.createElement('div', { className: 'block-divider' },
        React.createElement('div', { className: 'block-divider-eyebrow' }, b.tag),

        React.createElement('div', { className: 'block-divider-desc' }, b.desc),
        React.createElement('div', { className: 'block-divider-time' }, 'Tiempo asignado: ' + fmtTime(b.timeSec) + ' · ' + b.questions.length + ' preguntas'),
        React.createElement('button', { className: 'btn-primary', onClick: startBlock }, 'Iniciar bloque →')
      )
    );
  }

  // ============================================================
  // RENDER: QUIZ
  // ============================================================
  function renderQuiz() {
    const b = block;
    const q = b.questions[qIdx];
    const userAns = (answers[b.id] || [])[qIdx];
    const hasAnswer = userAns !== undefined;

    return React.createElement(QuizBody, {
      key: b.id,
      block: b,
      qIdx, q, userAns, hasAnswer,
      onExpire: handleBlockExpire,
      onSelect: selectAnswer,
      onNext: nextQuestion,
      onPrev: prevQuestion,
    });
  }

  // ============================================================
  // RENDER: DONE
  // ============================================================
  function renderDone() {
    const firstName = candidate.name.split(' ')[0] || '';
    return React.createElement('div', { className: 'screen' },
      React.createElement('div', { className: 'done-screen' },
        React.createElement('div', { className: 'done-icon' }, '✓'),
        React.createElement('div', { className: 'done-title' }, 'Prueba completada'),
        React.createElement('p', { className: 'done-sub' },
          'Gracias, ' + firstName + '. Tus respuestas fueron registradas. El equipo de selección revisará tus resultados como parte del proceso.'),
        submitStatus === 'error' && React.createElement('p', { style: { color: 'var(--danger)', fontSize: '13px', marginTop: '16px' } },
          'Hubo un problema técnico al enviar tus respuestas. Por favor avisa al equipo de selección.')
      )
    );
  }

  let body;
  if (view === 'intro') body = renderIntro();
  else if (view === 'divider') body = renderDivider();
  else if (view === 'quiz') body = renderQuiz();
  else if (view === 'done') body = renderDone();

  return React.createElement(React.Fragment, null, topBar, body);
}

// ============================================================
// QUIZ BODY (isolated component so timer resets cleanly per block)
// ============================================================
function QuizBody({ block, qIdx, q, userAns, hasAnswer, onExpire, onSelect, onNext, onPrev }) {
  const remaining = useTimer(block.timeSec, onExpire, true);
  const pct = (remaining / block.timeSec) * 100;
  const urgent = remaining <= 20;
  const progressPct = ((qIdx + 1) / block.questions.length) * 100;

  return React.createElement('div', { className: 'screen' },
    React.createElement('div', { className: 'quiz-header' },
      React.createElement('div', { className: 'quiz-header-top' },
        React.createElement('div', null,
          React.createElement('div', { className: 'block-tag' }, block.tag),
          React.createElement('div', { className: 'block-title' }, block.name)
        ),
        React.createElement('div', { className: 'timer-box' },
          React.createElement('div', { className: 'timer-value' + (urgent ? ' urgent' : '') }, fmtTime(remaining)),
          React.createElement('div', { className: 'timer-label' }, 'tiempo restante')
        )
      ),
      React.createElement('div', { className: 'progress-track' },
        React.createElement('div', { className: 'progress-fill' + (urgent ? ' urgent' : ''), style: { width: progressPct + '%' } })
      ),
      React.createElement('div', { className: 'progress-meta' },
        React.createElement('span', null, 'Pregunta ' + (qIdx + 1) + ' de ' + block.questions.length),
        React.createElement('span', null, Math.round(pct) + '% del tiempo del bloque')
      )
    ),
    React.createElement('div', { className: 'question-card' },
      React.createElement('div', { className: 'question-num' }, 'Pregunta ' + (qIdx + 1)),
      React.createElement('div', { className: 'question-text' },
        q.q.split('\n').map((line, i) => React.createElement('div', { key: i }, line))),
      block.type === 'mcq'
        ? React.createElement('div', { className: 'options-list' },
            q.opts.map((opt, i) => React.createElement('button', {
              key: i,
              className: 'option-btn' + (userAns === i ? ' selected' : ''),
              onClick: () => onSelect(i)
            },
              React.createElement('span', { className: 'option-letter' }, String.fromCharCode(65 + i)),
              React.createElement('span', null, opt)
            ))
          )
        : React.createElement('div', { className: 'likert-scale' },
            [1,2,3,4,5].map(v => React.createElement('button', {
              key: v,
              className: 'likert-btn' + (userAns === v ? ' selected' : ''),
              onClick: () => onSelect(v)
            },
              React.createElement('span', { className: 'likert-num' }, v),
              React.createElement('span', { className: 'likert-text' }, LIKERT_LABELS[v-1])
            ))
          )
    ),
    React.createElement('div', { className: 'nav-row' },
      React.createElement('button', { className: 'btn-ghost', onClick: onPrev, disabled: qIdx === 0, style: qIdx === 0 ? {opacity:0.4, cursor:'not-allowed'} : {} }, '← Anterior'),
      React.createElement('button', { className: 'btn-primary', onClick: onNext, disabled: !hasAnswer },
        qIdx + 1 < block.questions.length ? 'Siguiente →' : 'Finalizar bloque →')
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));

})();
</script>
</body>
</html>
